<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTEK — Çevrimdışı</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0F1E;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
    }
    .icon { font-size: 64px; opacity: 0.5; }
    h1 { font-size: 24px; font-weight: 700; color: #00D4FF; }
    p { font-size: 14px; color: #94a3b8; text-align: center; max-width: 320px; line-height: 1.6; }
    .badge {
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.2);
      color: #00D4FF;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    button {
      margin-top: 8px;
      padding: 12px 32px;
      background: #00D4FF;
      color: #0A0F1E;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="badge">SENTEK</div>
  <div class="icon">📡</div>
  <h1>Çevrimdışı</h1>
  <p>İnternet bağlantısı bulunamadı. Bağlantınızı kontrol edin ve tekrar deneyin.</p>
  <p>Kaydettiğiniz veriler çevrimiçi olduğunuzda otomatik olarak senkronize edilecektir.</p>
  <button onclick="location.reload()">Yeniden Dene</button>
</body>
</html>
